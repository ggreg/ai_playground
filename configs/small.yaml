# Small model (~125M params) — GPT-2 small scale, single GPU
model:
  vocab_size: 32000
  dim: 768
  n_layers: 12
  n_heads: 12
  n_kv_heads: 4      # GQA
  max_seq_len: 2048
  dropout: 0.0

training:
  max_steps: 5000
  batch_size: 16
  learning_rate: 3.0e-4
  weight_decay: 0.1
  warmup_steps: 200
  grad_clip: 1.0
  grad_accum_steps: 4    # Effective batch = 64
  dtype: bfloat16
  log_interval: 10
  eval_interval: 100
  save_interval: 1000
