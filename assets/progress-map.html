<style>
  .aipg-map {
    display: flex;
    flex-wrap: wrap;
    gap: 0.7rem 1.4rem;
    align-items: flex-end;
    padding: 0.65rem 0.95rem;
    margin: 0 0 1.5rem;
    border: 1px solid rgba(11, 11, 11, 0.08);
    border-radius: 10px;
    background: rgba(74, 58, 167, 0.035);
    font-size: 0.72rem;
    line-height: 1;
  }
  body.quarto-dark .aipg-map {
    border-color: rgba(255, 255, 255, 0.12);
    background: rgba(144, 133, 233, 0.07);
  }
  .aipg-mod { display: flex; flex-direction: column; gap: 0.35rem; }
  .aipg-mod-label {
    color: #898781;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
    font-size: 0.6rem;
    white-space: nowrap;
  }
  .aipg-dots { display: flex; align-items: center; gap: 0.45rem; }
  .aipg-dot {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    border: 2px solid #b6b4ad;
    background: transparent;
    display: inline-block;
    flex: none;
  }
  .aipg-dot:hover { border-color: #4a3aa7; }
  .aipg-dot.visited { background: #4a3aa7; border-color: #4a3aa7; }
  .aipg-dot.current { box-shadow: 0 0 0 3px rgba(74, 58, 167, 0.25); animation: aipg-pulse 2s ease-in-out infinite; }
  body.quarto-dark .aipg-dot { border-color: #6b6a63; }
  body.quarto-dark .aipg-dot.visited { background: #9085e9; border-color: #9085e9; }
  body.quarto-dark .aipg-dot:hover { border-color: #9085e9; }
  body.quarto-dark .aipg-dot.current { box-shadow: 0 0 0 3px rgba(144, 133, 233, 0.3); }
  @keyframes aipg-pulse {
    50% { box-shadow: 0 0 0 5px rgba(74, 58, 167, 0.12); }
  }
  .aipg-here { color: #4a3aa7; font-weight: 700; white-space: nowrap; }
  body.quarto-dark .aipg-here { color: #9085e9; }
  .aipg-meta { margin-left: auto; align-self: center; color: #898781; white-space: nowrap; }
  .aipg-meta a { color: #898781; text-decoration: underline; }
</style>
<script>
  (function () {
    // The book, in reading order. Keep in sync with the sidebar in _quarto.yml.
    const BOOK = [
      { m: "Start", t: "Home", h: "index.html" },
      { m: "Guides", t: "Learning Path", h: "docs/LEARNING_PATH.html" },
      { m: "Guides", t: "Concepts FAQ", h: "docs/CONCEPTS.html" },
      { m: "Guides", t: "Papers", h: "docs/PAPERS.html" },
      { m: "Guides", t: "Videos", h: "docs/VIDEOS.html" },
      { m: "Guides", t: "Performance Exercises", h: "docs/PERFORMANCE_EXERCISES.html" },
      { m: "Guides", t: "Cloud Setup", h: "docs/CLOUD_SETUP.html" },
      { m: "Guides", t: "Progress Template", h: "docs/PROGRESS_TEMPLATE.html" },
      { m: "Transformer Internals", t: "Transformer Overview", h: "notebooks/01_transformer_internals/00_transformer_overview.html" },
      { m: "Transformer Internals", t: "Attention Mechanisms", h: "notebooks/01_transformer_internals/01_attention_mechanisms.html" },
      { m: "Transformer Internals", t: "Mixture of Experts", h: "notebooks/01_transformer_internals/02_mixture_of_experts.html" },
      { m: "Training Optimization", t: "Training From Scratch", h: "notebooks/02_training_optimization/00_training_from_scratch.html" },
      { m: "Training Optimization", t: "Learning Rate Schedules", h: "notebooks/02_training_optimization/01_learning_rate_schedules.html" },
      { m: "Training Optimization", t: "Mixed Precision", h: "notebooks/02_training_optimization/02_mixed_precision.html" },
      { m: "Training Optimization", t: "Gradient Accumulation", h: "notebooks/02_training_optimization/03_gradient_accumulation.html" },
      { m: "Training Optimization", t: "AdamW From Scratch", h: "notebooks/02_training_optimization/04_adamw_from_scratch.html" },
      { m: "GPU & NVIDIA Tools", t: "SGEMM Optimization", h: "notebooks/05_gpu_nvidia_tools/02_sgemm_optimization.html" },
    ];
    const KEY = "aipg-visited";

    function el(tag, cls, text) {
      const n = document.createElement(tag);
      n.className = cls;
      if (text) n.textContent = text;
      return n;
    }

    let path = location.pathname;
    if (path.endsWith("/")) path += "index.html";
    const current = BOOK.find((s) => path.endsWith("/" + s.h));

    let visited;
    try {
      visited = new Set(JSON.parse(localStorage.getItem(KEY) || "[]"));
    } catch (e) {
      visited = new Set();
    }
    if (current) {
      visited.add(current.h);
      try { localStorage.setItem(KEY, JSON.stringify([...visited])); } catch (e) {}
    }

    // Site root prefix relative to this page, provided by Quarto on every page
    const offsetMeta = document.querySelector('meta[name="quarto:offset"]');
    const root = offsetMeta ? offsetMeta.content : "";

    const map = el("nav", "aipg-map");
    map.setAttribute("aria-label", "Book map and reading progress");

    const mods = [];
    for (const s of BOOK) {
      let g = mods[mods.length - 1];
      if (!g || g.name !== s.m) { g = { name: s.m, stops: [] }; mods.push(g); }
      g.stops.push(s);
    }
    for (const g of mods) {
      const mod = el("div", "aipg-mod");
      mod.appendChild(el("span", "aipg-mod-label", g.name));
      const dots = el("div", "aipg-dots");
      for (const s of g.stops) {
        const a = document.createElement("a");
        a.className =
          "aipg-dot" +
          (visited.has(s.h) ? " visited" : "") +
          (current === s ? " current" : "");
        a.href = root + s.h;
        a.title = s.t + (visited.has(s.h) && current !== s ? " ✓" : "");
        a.setAttribute("aria-label", s.t);
        dots.appendChild(a);
        if (current === s) dots.appendChild(el("span", "aipg-here", "◂ you are here"));
      }
      mod.appendChild(dots);
      map.appendChild(mod);
    }

    const done = BOOK.filter((s) => visited.has(s.h)).length;
    const meta = el("span", "aipg-meta", done + " / " + BOOK.length + " read · ");
    const reset = document.createElement("a");
    reset.textContent = "reset";
    reset.href = "#";
    reset.addEventListener("click", (e) => {
      e.preventDefault();
      localStorage.removeItem(KEY);
      location.reload();
    });
    meta.appendChild(reset);
    map.appendChild(meta);

    const target =
      document.getElementById("quarto-document-content") || document.querySelector("main");
    if (target) target.insertBefore(map, target.firstChild);
  })();
</script>
