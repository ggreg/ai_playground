<style>
  :root {
    --bg: #0f1117;

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);

    padding: 2rem;

    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 0.25rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));

    -webkit-text-fill-color: transparent;

  .subtitle { color: var(--muted); margin-bottom: 2rem; font-size: 0.95rem; }
  .legend-bar {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    background: var(--card);
    border: 1px solid var(--border);

  .legend-bar .item { display: flex; align-items: center; gap: 6px; }

  .dot.spd { background: var(--accent); }
  .dot.mem { background: var(--accent3); }
  .dot.eas { background: var(--accent4); }
  .dot.mat { background: var(--accent2); }

    margin: 2.5rem 0 0.25rem;
    padding-bottom: 0.5rem;
    border-bottom: 2px solid var(--border);
    color: var(--accent);
  }
  .category-desc { color: var(--muted); font-size: 0.88rem; margin-bottom: 1.25rem; }

  .card {
    background: var(--card);

    font-size: 1.15rem;

    margin-bottom: 0.15rem;

  .card .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 0.75rem; }
  .tag {
    font-size: 0.72rem;
    padding: 3px 9px;
    border-radius: 999px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;

  .tag.green { background: rgba(78,219,161,0.15); color: var(--accent3); }
  .tag.blue  { background: rgba(108,140,255,0.15); color: var(--accent); }
  .tag.orange{ background: rgba(255,184,108,0.15); color: var(--accent4); }
  .tag.pink  { background: rgba(255,108,170,0.15); color: var(--accent2); }

    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 0.75rem;
    font-size: 0.78rem;
  }
  .badge {
    padding: 4px 0;
    border-radius: 6px;
    text-align: center;
    font-weight: 600;
  }
  .badge.spd { background: rgba(108,140,255,0.12); color: var(--accent); }
  .badge.mem { background: rgba(78,219,161,0.12); color: var(--accent3); }
  .badge.eas { background: rgba(255,184,108,0.12); color: var(--accent4); }
  .badge.mat { background: rgba(255,108,170,0.12); color: var(--accent2); }

  .chart-wrap {
    width: 220px;
    height: 220px;
    flex-shrink: 0;
  }

  /* Composite bar */
  .composite-row {
    margin-top: 0.6rem;
    font-size: 0.82rem;
    color: var(--muted);
  }
  .composite-row strong { color: var(--text); }
  .bar-track {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    margin-top: 4px;
    overflow: hidden;

  .bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent3));

  .ref-links {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 0.65rem;
  }
  .ref-links a {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.74rem;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 6px;
    text-decoration: none;
    transition: opacity 0.15s;
    letter-spacing: 0.01em;

  .ref-links a.paper { background: rgba(108,140,255,0.12); color: var(--accent); }
  .ref-links a.repo  { background: rgba(78,219,161,0.12); color: var(--accent3); }
  .ref-links a.docs  { background: rgba(255,184,108,0.12); color: var(--accent4); }
  .ref-links a svg { width: 13px; height: 13px; fill: currentColor; flex-shrink: 0; }

  /* Table of Contents */
  .toc {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem 2rem;
    margin-bottom: 2rem;
  }
  .toc h2 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-size: 0.82rem;
  }
  .toc-category {
    margin-bottom: 0.75rem;
  }
  .toc-category > a {
    font-weight: 700;
    font-size: 0.92rem;
    color: var(--text);
    text-decoration: none;
    transition: color 0.15s;
  }
  .toc-category > a:hover { color: var(--accent); }
  .toc-methods {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 12px;
    margin-top: 4px;
    padding-left: 0.75rem;
  }
  .toc-methods a {
    font-size: 0.8rem;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.15s;
  }
  .toc-methods a:hover { color: var(--accent3); }

  /* Responsive */
  @media (max-width: 700px) {
    .card { grid-template-columns: 1fr; }
    .chart-wrap { width: 180px; height: 180px; margin: 0 auto; }
  }
</style>

const categories = [

        body: "The simplest distributed training strategy. Every GPU holds a full copy of the model; after each backward pass an All-Reduce synchronizes gradients across workers. PyTorch DDP uses bucketed, overlapped All-Reduce to hide latency behind backward computation.",
        detail: "Near-linear throughput scaling up to hundreds of GPUs on fast interconnects. Memory footprint is unchanged — each GPU stores full parameters, gradients, and optimizer states (typically 16–20 bytes per parameter for Adam + FP32). This makes DDP impractical as a sole strategy for models above ~1–2 B parameters per GPU. It remains the universal baseline and composes with every other parallelism axis."

        body: "Shards parameters, gradients, and optimizer states evenly across all W data-parallel workers, reducing per-GPU memory from O(Model) to O(Model / W). Before each forward/backward step, an All-Gather reconstructs needed parameters; after backward, Reduce-Scatter distributes gradient shards.",
        detail: "Memory reduction is dramatic: a 70 B model with Adam FP32 needs ~980 GB of optimizer state alone, which ZeRO-3 divides across the cluster. The tradeoff is 1.5× the communication volume of DDP (All-Gather + Reduce-Scatter vs. All-Reduce). In practice, throughput drops 10–30% vs. DDP at the same GPU count, but ZeRO-3/FSDP enables training models that would otherwise not fit in memory at all. Shipped in both DeepSpeed and PyTorch natively."

        detail: "Memory savings come from distributing activation storage for LayerNorm and Dropout (which otherwise replicate the full sequence on every GPU). Communication volume is identical to standard TP — the operations are simply reorganized. This is why Megatron-SP is essentially free when TP is already in use and is enabled by default in Megatron-LM. It does not help with the attention computation itself (that still scales as O(N²))."

// ── Helper: slugify ─────────────────────────────────────────────────────
function slug(str) { return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, ''); }

// ── Build TOC ───────────────────────────────────────────────────────────
const toc = document.getElementById('toc');
categories.forEach(cat => {
  const catSlug = slug(cat.name);
  const div = document.createElement('div');
  div.className = 'toc-category';
  div.innerHTML = `<a href="#${catSlug}">${cat.name}</a>`;
  const methods = document.createElement('div');
  methods.className = 'toc-methods';
  cat.methods.forEach(m => {
    const mSlug = slug(m.title);
    const a = document.createElement('a');
    a.href = '#' + mSlug;
    a.textContent = m.title;
    methods.appendChild(a);
  });
  div.appendChild(methods);
  toc.appendChild(div);
});

// ── Build DOM ────────────────────────────────────────────────────────────
const app = document.getElementById('app');
const chartInstances = [];

categories.forEach(cat => {
  const catSlug = slug(cat.name);
  const hdr = document.createElement('div');
  hdr.className = 'category';
  hdr.id = catSlug;
  hdr.textContent = cat.name;
  app.appendChild(hdr);
  const desc = document.createElement('div');
  desc.className = 'category-desc';
  desc.textContent = cat.desc;
  app.appendChild(desc);

  cat.methods.forEach(m => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = slug(m.title);

    // Composite = sum of all four (higher = better across all axes), max = 20
    const spd = m.scores.SPD < 0 ? 0 : m.scores.SPD;
    const mem = m.scores.MEM < 0 ? 0 : m.scores.MEM;
    const composite = spd + mem + m.scores.EAS + m.scores.MAT;
    const maxComposite = 20;

    const linksHtml = m.links ? Object.entries(m.links)
      .filter(([,url]) => url)
      .map(([type, url]) => {
        const label = type === 'paper' ? 'Paper' : type === 'repo' ? 'GitHub' : 'Docs';
        return `<a class="${type}" href="${url}" target="_blank" rel="noopener">${ICONS[type]}${label}</a>`;
      }).join('') : '';

    card.innerHTML = `
      <div class="text-col">
        <h3>${m.title}</h3>
        <div class="aka">${m.aka}</div>
        <p>${m.body}</p>
        <p class="detail">${m.detail}</p>
        <div class="tags">${m.tags.map(t => `<span class="tag ${t[0]}">${t[1]}</span>`).join('')}</div>
        ${linksHtml ? `<div class="ref-links">${linksHtml}</div>` : ''}
        <div class="score-badges">
          <div class="badge spd">SPD ${m.scores.SPD}</div>
          <div class="badge mem">MEM ${m.scores.MEM}</div>
          <div class="badge eas">EAS ${m.scores.EAS}</div>
          <div class="badge mat">MAT ${m.scores.MAT}</div>
        </div>
        <div class="composite-row">
          Composite ROI: <strong>${composite}</strong> / ${maxComposite}
          <div class="bar-track"><div class="bar-fill" style="width:${(composite/maxComposite)*100}%"></div></div>
        </div>
      </div>
      <div class="chart-wrap"><canvas></canvas></div>
    `;
    app.appendChild(card);

    const canvas = card.querySelector('canvas');
    const ctx = canvas.getContext('2d');
    const displaySPD = Math.max(m.scores.SPD, 0);
    const displayMEM = Math.max(m.scores.MEM, 0);

    chartInstances.push(new Chart(ctx, {
      type: 'radar',
      data: {
        labels: ['SPD', 'MEM', 'EAS', 'MAT'],
        datasets: [{
          data: [displaySPD, displayMEM, m.scores.EAS, m.scores.MAT],
          backgroundColor: 'rgba(108,140,255,0.15)',
          borderColor: 'rgba(108,140,255,0.8)',
          borderWidth: 2,
          pointBackgroundColor: ['#6c8cff','#4edba1','#ffb86c','#ff6caa'],
          pointBorderColor: ['#6c8cff','#4edba1','#ffb86c','#ff6caa'],
          pointRadius: 5,
          pointHoverRadius: 7,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: { legend: { display: false } },
        scales: {
          r: {
            min: 0,
            max: 5,
            ticks: { stepSize: 1, display: false },
            grid: { color: 'rgba(255,255,255,0.08)' },
            angleLines: { color: 'rgba(255,255,255,0.08)' },
            pointLabels: {
              color: ['#6c8cff','#4edba1','#ffb86c','#ff6caa'],
              font: { size: 12, weight: '700' },
            }
          }
        }
      }
    }));
  });
