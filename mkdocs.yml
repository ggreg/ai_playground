site_name: AI Playground
site_description: Learning LLM internals, training optimization, distributed training, and GPU performance
site_url: https://greg.0x80.net/ai_playground/
repo_url: https://github.com/ggreg/ai_playground
repo_name: ggreg/ai_playground

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

plugins:
  - search
  - mkdocs-jupyter:
      execute: false
      include_source: true
      ignore:
        - "*_rendered.ipynb"

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - tables
  - toc:
      permalink: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Guides:
      - Learning Path: LEARNING_PATH.md
      - Concepts FAQ: CONCEPTS.md
      - Papers: PAPERS.md
      - Performance Exercises: PERFORMANCE_EXERCISES.md
      - Cloud Setup: CLOUD_SETUP.md
      - Progress Template: PROGRESS_TEMPLATE.md
  - Transformer Internals:
      - Transformer Overview: notebooks/01_transformer_internals/00_transformer_overview.ipynb
      - Attention Mechanisms: notebooks/01_transformer_internals/01_attention_mechanisms.ipynb
      - Mixture of Experts: notebooks/01_transformer_internals/02_mixture_of_experts.ipynb
  - Training Optimization:
      - Training From Scratch: notebooks/02_training_optimization/00_training_from_scratch.ipynb
      - Learning Rate Schedules: notebooks/02_training_optimization/01_learning_rate_schedules.ipynb
      - Mixed Precision: notebooks/02_training_optimization/02_mixed_precision.ipynb
      - Gradient Accumulation: notebooks/02_training_optimization/03_gradient_accumulation.ipynb
      - AdamW From Scratch: notebooks/02_training_optimization/04_adamw_from_scratch.ipynb
  - GPU & NVIDIA Tools:
      - SGEMM Optimization: notebooks/05_gpu_nvidia_tools/02_sgemm_optimization.ipynb
